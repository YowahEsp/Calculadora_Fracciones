<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Calculadora Visual de Fracciones</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#eef3f8; --panel:#fbfdff; --text:#1f2937; --accent:#0ea5e9; --muted:#6b7280;
      --card-shadow: 10px 10px 20px rgba(0,0,0,0.06), -6px -6px 14px rgba(255,255,255,0.7);
    }
    body.dark { --bg:#0b1020; --panel:#0f1724; --text:#e6eef8; --accent:#60a5f8; --muted:#9aa6bf; }
    *{box-sizing:border-box}
    body{margin:0;font-family:'Poppins',system-ui,Segoe UI,Roboto,Arial;color:var(--text);background:var(--bg);padding:28px;transition:all .2s}
    .app{max-width:1200px;margin:0 auto;background:var(--panel);border-radius:24px;box-shadow:var(--card-shadow);display:grid;grid-template-columns:1fr 350px;gap:20px;padding:20px}
    #main-calc{display:flex;flex-direction:column;gap:20px}
    #editor{border:2px dashed var(--accent);padding:20px 24px;border-radius:16px;min-height:100px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;outline:none}
    #editor:focus::after {
        content: '|';
        font-size: 24px;
        color: var(--accent);
        animation: blink 1s step-end infinite;
        font-weight: bold;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .token{display:inline-flex;align-items:center;justify-content:center;font-size:24px;font-weight:600;cursor:pointer;padding:8px;border-radius:8px;transition:all .2s}
    .token.frac{flex-direction:column;padding:0}
    .token.op,.token.paren{padding:8px 16px;background:rgba(0,0,0,0.05);min-width:48px}
    body.dark .token.op, body.dark .token.paren { background: rgba(255,255,255,0.08); }
    .token.selected{background:var(--accent);color:#fff;position:relative}
    .token.selected.insert-before::before,
    .token.selected.insert-after::after {
      content:''; position: absolute; top: 50%; transform: translateY(-50%);
      width: 4px; height: 60%; background-color: #f59e0b; border-radius: 2px;
    }
    .token.selected.insert-before::before { left: -8px; }
    .token.selected.insert-after::after { right: -8px; }
    .token.frac .num,.token.frac .den,.token.int input{
      width:60px;padding:4px 8px;font-size:22px;text-align:center;border:1px solid #ccc;border-radius:6px;background:var(--bg);color:var(--text);
    }
    .token.frac .bar{height:2px;background:var(--text);width:100%;margin:2px 0}
    #controls{padding:10px;border-radius:12px;background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.05)}
    body.dark #controls { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.1); }
    .btn-row{display:flex;gap:10px;margin-bottom:10px}
    .btn{flex:1;padding:12px;font-size:18px;border:none;border-radius:8px;background:var(--panel);color:var(--text);box-shadow:var(--card-shadow);cursor:pointer;transition:all .15s}
    .btn:hover{transform:translateY(-2px);box-shadow:4px 4px 8px rgba(0,0,0,0.1),-2px -2px 4px rgba(255,255,255,0.6)}
    .btn.primary{background:var(--accent);color:#fff}
    #sidebar{display:flex;flex-direction:column;gap:20px;background:rgba(0,0,0,0.02);padding:20px;border-radius:16px}
    body.dark #sidebar { background:rgba(255,255,255,0.04); }
    #output{flex:1;padding:15px;background:var(--bg);border-radius:12px;overflow-y:auto;min-height:200px}
    .step{margin-bottom:15px}
    .step .label{font-weight:600;color:var(--muted);font-size:14px;margin-bottom:4px}
    .expr-text{font-size:16px;background:var(--panel);padding:8px 12px;border-radius:8px;word-wrap:break-word}
    .result-big{font-size:28px;font-weight:700;color:var(--accent)}
    .visually-hidden { position: absolute; width: 1px; height: 1px; margin: -1px; padding: 0; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
  </style>
</head>
<body>
  <div class="app">
    <div id="main-calc">
      <div id="editor" tabindex="0" aria-label="Editor de expresiones matemáticas. Use las flechas para navegar y las teclas de operador para insertar."></div>
      <div id="controls">
        <div class="btn-row">
          <button class="btn" data-action="insert-frac">Fracción</button>
          <button class="btn" data-action="insert-int">Entero</button>
          <button class="btn" data-action="insert-par" data-val="(">(</button>
          <button class="btn" data-action="insert-par" data-val=")">)</button>
        </div>
        <div class="btn-row">
          <button class="btn" data-action="insert-op" data-val="+">+</button>
          <button class="btn" data-action="insert-op" data-val="-">−</button>
          <button class="btn" data-action="insert-op" data-val="*">×</button>
          <button class="btn" data-action="insert-op" data-val="/">÷</button>
        </div>
        <div class="btn-row">
          <button id="calc" class="btn primary" style="flex:2">Resolver</button>
          <button class="btn" data-action="backspace">⌫</button>
          <button class="btn" data-action="clear">C</button>
        </div>
      </div>
      <div class="utils">
        <button id="showText">Texto</button>
        <button id="themeToggle">Tema</button>
      </div>
    </div>
    <div id="sidebar">
      <h3>Pasos del Cálculo</h3>
      <div id="output"></div>
    </div>
  </div>
  <div id="announcer" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

<script>
  // ===== UTILIDADES MATEMÁTICAS =====
  function gcd(a,b){a=Math.abs(a);b=Math.abs(b);if(a===0)return b;if(b===0)return a;while(b){const t=a%b;a=b;b=t}return a}
  function lcm(a,b){if(a===0||b===0)return 0;return Math.abs(a/gcd(a,b)*b)}
  function normalizeFraction(n,d){if(d===0)throw new Error('Denominador no puede ser 0');if(d<0){n=-n;d=-d}const g=gcd(Math.abs(n),d);n=Math.trunc(n/g);d=Math.trunc(d/g);return{n,d}}
  function fmtFrac(f){if(f.d===1)return`${f.n}`;return`${f.n}/${f.d}`}

  // ===== PARSER Y EVALUADOR =====
  function tokenize(s) {
    s = s.replace(/\[|\{/g, '(').replace(/\]|\}/g, ')').replace(/[×]/g, '*').replace(/[−]/g, '-').replace(/[÷]/g, '/');
    const tokens = [];
    const tokenDefs = [
      { type: 'frac', regex: /^-?(\d+)\s*\/\s*(\d+)/ },
      { type: 'int', regex: /^-?(\d+)/ },
      { type: 'op', regex: /^[+\-*/]/ },
      { type: 'par_open', regex: /^\(/ },
      { type: 'par_close', regex: /^\)/ },
      { type: 'space', regex: /^\s+/ }
    ];
    let remaining = s;
    while (remaining.length > 0) {
      let matched = false;
      for (const def of tokenDefs) {
        const match = remaining.match(def.regex);
        if (match) {
          if (def.type !== 'space') {
            if (def.type === 'frac') tokens.push({ type: 'frac', n: parseInt(match[1], 10), d: parseInt(match[2], 10) });
            else if (def.type === 'int') tokens.push({ type: 'int', v: parseInt(match[0], 10) });
            else tokens.push({ type: def.type, v: match[0] });
          }
          remaining = remaining.substring(match[0].length);
          matched = true;
          break;
        }
      }
      if (!matched) throw new Error(`Carácter no válido: '${remaining[0]}'`);
    }
    return tokens;
  }
  const OPS={'+':{prec:2,assoc:'L'},'-':{prec:2,assoc:'L'},'*':{prec:3,assoc:'L'},'/':{prec:3,assoc:'L'}};
  function toRPN(tokens){const out=[];const stack=[];for(const t of tokens){if(t.type==='int'||t.type==='frac')out.push(t);else if(t.type==='op'){while(stack.length){const top=stack[stack.length-1];if(top.type==='op'&&((OPS[t.v].assoc==='L'&&OPS[t.v].prec<=OPS[top.v].prec)||(OPS[t.v].assoc==='R'&&OPS[t.v].prec<OPS[top.v].prec))){out.push(stack.pop())}else break}stack.push(t)}else if(t.type==='par_open')stack.push(t);else if(t.type==='par_close'){while(stack.length&&stack[stack.length-1].type!=='par_open')out.push(stack.pop());if(!stack.length)throw new Error('Paréntesis desequilibrados');stack.pop()} } while(stack.length){const x=stack.pop();if(x.type.startsWith('par_'))throw new Error('Paréntesis desequilibrados');out.push(x)} return out}
  function fracAdd(a,b,steps){const m=lcm(a.d,b.d);const na=a.n*(m/a.d);const nb=b.n*(m/b.d);steps.push({label:'Denominador común (Suma)',text:`${fmtFrac(a)} + ${fmtFrac(b)} → ${fmtFrac({n:na,d:m})} + ${fmtFrac({n:nb,d:m})}`});return normalizeFraction(na+nb,m)}
  function fracSub(a,b,steps){const m=lcm(a.d,b.d);const na=a.n*(m/a.d);const nb=b.n*(m/b.d);steps.push({label:'Denominador común (Resta)',text:`${fmtFrac(a)} - ${fmtFrac(b)} → ${fmtFrac({n:na,d:m})} - ${fmtFrac({n:nb,d:m})}`});return normalizeFraction(na-nb,m)}
  function fracMul(a,b,steps){steps.push({label:'Multiplicación',text:`${fmtFrac(a)} × ${fmtFrac(b)} = ${a.n*b.n}/${a.d*b.d}`});return normalizeFraction(a.n*b.n,a.d*b.d)}
  function fracDiv(a,b,steps){if(b.n===0)throw new Error('División por cero');steps.push({label:'División (inversa)',text:`${fmtFrac(a)} ÷ ${fmtFrac(b)} → ${fmtFrac(a)} × ${fmtFrac({n:b.d,d:b.n})}`});return fracMul(a,{n:b.d,d:b.n},[])}
  function evalRPN(rpn,steps){const stack=[];for(const t of rpn){if(t.type==='int'){stack.push(normalizeFraction(t.v,1))}else if(t.type==='frac'){stack.push(normalizeFraction(t.n,t.d))}else if(t.type==='op'){const b=stack.pop();const a=stack.pop();if(a===undefined||b===undefined)throw new Error('Operandos insuficientes');let res;if(t.v==='+')res=fracAdd(a,b,steps);else if(t.v==='-')res=fracSub(a,b,steps);else if(t.v==='*')res=fracMul(a,b,steps);else if(t.v==='/')res=fracDiv(a,b,steps);stack.push(res)}}if(stack.length!==1)throw new Error('Expresión inválida');return stack[0]}

  // ===== UI EDITOR VISUAL =====
  const editor=document.getElementById('editor');
  const output=document.getElementById('output');
  const announcer=document.getElementById('announcer');
  function announce(msg){announcer.textContent=msg}

  let autoFracMode = false;

  function createFrac(n='',d='',focusDen=false){
    const span=document.createElement('span');
    span.className='token frac'; span.tabIndex=-1; span.dataset.type='frac';
    span.innerHTML=`<input class="num" type="number" value="${n}" aria-label="Numerador" placeholder="n"><div class="bar"></div><input class="den" type="number" value="${d}" aria-label="Denominador" placeholder="d">`;
    span.addEventListener('click',handleTokenClick);
    const numInput=span.querySelector('.num'), denInput=span.querySelector('.den');
    const exitHandler=e=>{
      if(e.key==='/' && e.target===denInput){e.preventDefault();e.stopPropagation();return;}
      const validKeys=['+','-','*','/','(',')','Enter'];
      if(validKeys.includes(e.key)){
        e.preventDefault();e.stopPropagation();e.target.blur();setSelected(span);insertMode='after';
        if(e.key!=='Enter'){
          if('()'.includes(e.key))insertElement(createParen(e.key));else insertElement(createOp(e.key));
          autoFracMode = true; editor.focus();
        }else{editor.focus()}
      }
    };
    numInput.addEventListener('keydown',e=>{
      if(e.key==='/'){e.preventDefault();e.stopPropagation();denInput.focus()}
      else exitHandler(e);
    });
    denInput.addEventListener('keydown',exitHandler);
    if(focusDen)setTimeout(()=>denInput.focus(),0);else setTimeout(()=>numInput.focus(),0);
    return span;
  }
  function createInt(v='',autoFocus=false){
    const span=document.createElement('span');
    span.className='token int'; span.tabIndex=-1; span.dataset.type='int';
    span.innerHTML=`<input type="number" value="${v}" aria-label="Entero" placeholder="n">`;
    span.addEventListener('click',handleTokenClick);
    const input=span.querySelector('input');
    input.addEventListener('keydown',e=>{
      if(e.key==='/'){
        e.preventDefault();e.stopPropagation();
        const newFrac=createFrac(input.value,'',true);
        if(span.parentNode)span.parentNode.replaceChild(newFrac,span);
        setSelected(newFrac);announce("Número convertido a fracción. Introduzca el denominador.");
      }else if(['+','-','*','(',')','Enter'].includes(e.key)){
        e.preventDefault();input.blur();setSelected(span);insertMode='after';
        if(e.key!=='Enter'){if('()'.includes(e.key))insertElement(createParen(e.key));else insertElement(createOp(e.key)); autoFracMode=true; editor.focus();}
        else{editor.focus()}
      }
    });
    if(autoFocus)setTimeout(()=>input.focus(),0);
    return span;
  }
  function createOp(opKey){
    const span=document.createElement('span');
    span.className='token op'; span.tabIndex=-1; span.dataset.type='op';
    const opMap={'+':'+','-':'−','*':'×','/':'÷'};
    span.dataset.val=opKey; span.textContent=opMap[opKey]||opKey;
    span.addEventListener('click',handleTokenClick); return span;
  }
  function createParen(ch){
    const span=document.createElement('span');
    span.className='token paren'; span.tabIndex=-1; span.dataset.type='paren'; span.dataset.val=ch; span.textContent=ch;
    span.addEventListener('click',handleTokenClick); return span;
  }
  let selected=null, insertMode='after';
  function setSelected(el){
    if(selected)selected.classList.remove('selected','insert-before','insert-after');
    selected=el; if(el){el.classList.add('selected');el.classList.add(insertMode==='before'?'insert-before':'insert-after')}
  }
  function handleTokenClick(e){
    e.stopPropagation(); const token=e.currentTarget; const rect=token.getBoundingClientRect();
    const clickX=e.clientX, tokenCenter=rect.left+rect.width/2;
    if(token.querySelector('input')&&e.target.tagName==='INPUT'){setSelected(token);return}
    insertMode=clickX<tokenCenter?'before':'after'; setSelected(token);
  }
  function insertElement(newEl,focusInput=false){
    if(!selected)editor.appendChild(newEl);
    else if(insertMode==='after')selected.after(newEl); else selected.before(newEl);
    insertMode='after'; setSelected(newEl);
    if(focusInput){const inp=newEl.querySelector('input, .num'); if(inp)inp.focus()}
  }

  document.querySelectorAll('[data-action]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const action=btn.dataset.action;
      if(action==='insert-frac'){insertElement(createFrac('','',false),true);announce("Fracción añadida")}
      else if(action==='insert-int'){insertElement(createInt('',true));announce("Entero añadido")}
      else if(action==='insert-op'){
          insertElement(createOp(btn.dataset.val));
          autoFracMode = true;
          editor.focus();
          announce(`Operador ${btn.textContent} añadido. Escriba el siguiente número.`);
      }
      else if(action==='insert-par'){insertElement(createParen(btn.dataset.val));autoFracMode=false;announce("Paréntesis añadido")}
      else if(action==='backspace'){if(selected){const toSelect=selected.previousElementSibling||selected.nextElementSibling; selected.remove(); setSelected(toSelect); announce("Elemento borrado")}}
      else if(action==='clear'){startNewInput();announce("Editor limpiado")}
    });
  });

  editor.addEventListener('focus',()=>{if(!selected&&editor.firstElementChild)setSelected(editor.firstElementChild)});
  editor.addEventListener('keydown',e=>{
    // SOLUCIÓN: Comprueba el origen del evento (e.target) en lugar del elemento activo.
    if(e.target.tagName === 'INPUT') return;

    if(e.key.match(/^[0-9]$/)){
        e.preventDefault();
        if (autoFracMode) {
            insertElement(createFrac(e.key, '', true), true);
            autoFracMode = false;
        } else {
            insertElement(createInt(e.key, true));
        }
        announce(`Número ${e.key} añadido.`);
    }
    else if('()'.includes(e.key)){e.preventDefault();insertElement(createParen(e.key));autoFracMode=false;announce(`Paréntesis ${e.key} añadido`)}
    else if('+-*/'.includes(e.key)&&(editor.children.length>0||selected)){e.preventDefault();insertElement(createOp(e.key)); autoFracMode = true; editor.focus(); announce(`Operador ${e.key} añadido. Escriba el siguiente número.`)}
    else if(e.key==='ArrowRight'&&selected&&selected.nextElementSibling){insertMode='after';setSelected(selected.nextElementSibling)}
    else if(e.key==='ArrowLeft'&&selected&&selected.previousElementSibling){insertMode='before';setSelected(selected.previousElementSibling)}
    else if(e.key==='Backspace'){e.preventDefault();let toRemove=selected||editor.lastElementChild;if(toRemove){const toSelect=toRemove.previousElementSibling;toRemove.remove();setSelected(toSelect);if(!toSelect)editor.focus();announce("Elemento borrado")}}
  });

  function buildExpression(){
    const parts=[];
    for(const child of editor.children){
      const t=child.dataset.type;
      if(t==='frac'){const n=child.querySelector('.num').value||'0', d=child.querySelector('.den').value||'1'; parts.push(`${n}/${d}`)}
      else if(t==='int'){const v=child.querySelector('input').value||'0'; parts.push(v)}
      else if(t==='op')parts.push(child.dataset.val);
      else if(t==='paren')parts.push(child.dataset.val);
    }
    return parts.join(' ');
  }
  function writeStep(label,text){
    const div=document.createElement('div'); div.className='step';
    div.innerHTML=`<div class="label">${label}</div><div class="expr-text">${text}</div>`;
    output.appendChild(div); output.scrollTop=output.scrollHeight;
  }
  function writeResult(fr){
    const div=document.createElement('div'); div.className='step';
    div.innerHTML=`<div class="label">Resultado Final</div><div class="expr-text"><strong class="result-big">${fmtFrac(fr)}</strong></div>`;
    output.appendChild(div);
  }
  document.getElementById('calc').addEventListener('click',()=>{
    output.innerHTML=''; const expr=buildExpression();
    if(!expr.trim()){writeStep('Aviso','Construya una operación');return}
    writeStep('Expresión',expr);
    try{const tokens=tokenize(expr), rpn=toRPN(tokens), steps=[], result=evalRPN(rpn,steps);
      steps.forEach(s=>writeStep(s.label,s.text)); writeResult(result);
      announce("Cálculo completado. Resultado: "+fmtFrac(result));
    }catch(e){writeStep('Error',e.message||String(e)); announce("Error: "+(e.message||String(e)));}
  });
  document.getElementById('showText').addEventListener('click',()=>alert('Expresión: '+buildExpression()));
  document.getElementById('themeToggle').addEventListener('click',()=>document.body.classList.toggle('dark'));

  function startNewInput(){editor.innerHTML='';output.innerHTML='';selected=null;editor.focus();}
  startNewInput();
</script>
</body>
</html>
